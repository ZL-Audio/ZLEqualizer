name: AAX Pre Release

on:
  workflow_dispatch:

# When pushing new commits, cancel any running builds on that branch
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUILD_TYPE: Release
  BUILD_DIR: Builds
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DISPLAY: :0 # linux pluginval needs this
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  build_and_test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS-x86-64
            os: macos-26
            cmake_extra_flags: -DCMAKE_OSX_ARCHITECTURES="x86_64" -DZL_JUCE_FORMATS="AAX" -DZL_HWY_STATIC_TARGET="SSE4"
          - name: macOS-arm64
            os: macos-26
            cmake_extra_flags: -DCMAKE_OSX_ARCHITECTURES="arm64" -DZL_JUCE_FORMATS="AAX" -DZL_HWY_STATIC_TARGET="NEON"
          - name: Windows-x86-64
            os: windows-2025
            vcvars_script: vcvars64.bat
            cmake_extra_flags: -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DZL_JUCE_FORMATS="AAX" -DZL_HWY_STATIC_TARGET="SSE2"
          - name: Windows-x86-64-AVX2
            os: windows-2025
            vcvars_script: vcvars64.bat
            cmake_extra_flags: -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DZL_JUCE_FORMATS="AAX" -DZL_HWY_STATIC_TARGET="AVX2"

    steps:
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install ninja

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
          fetch-depth: 0

      - name: Import Certificates (macOS)
        uses: apple-actions/import-codesign-certs@v7
        if: ${{ (matrix.name == 'macOS') && (env.p12-file-base64 != '')}}
        with:
          p12-file-base64: ${{ secrets.DEV_ID_APP_CERT }}
          p12-password: ${{ secrets.DEV_ID_APP_PASSWORD }}
        env:
          p12-file-base64: ${{ secrets.DEV_ID_APP_CERT }}

      - name: Configure and Build (macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -B ${{ env.BUILD_DIR }} -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE}} ${{ matrix.cmake_extra_flags }} .
          cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }}

      - name: Configure and Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\VC\Auxiliary\Build\${{ matrix.vcvars_script }}"
          cmake -B ${{ env.BUILD_DIR }} -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE}} ${{ matrix.cmake_extra_flags }} .
          cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }}

      - name: Read in .env from CMake
        shell: bash
        run: |
          cat .env >> $GITHUB_ENV

      - name: Check AAX releases
        shell: bash
        run: |
          ls "${{ env.ARTIFACTS_PATH }}/AAX"

      - name: Upload AAX
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: "${{ env.ARTIFACTS_PATH }}/AAX/*.aaxplugin"

  pre-release:
    name: Release AAX
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
    - name: Get artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Zip Artifacts
      run: |
        mkdir -p upload_ready
        cd artifacts
        for dir in */; do
            name=${dir%/}
            echo "Zipping folder $name..."
            zip -r "../upload_ready/$name.zip" "$name"
        done
        cd ..
        ls -l upload_ready

    - name: Upload to ZLAAX Release
      env:
        GH_TOKEN: ${{ secrets.AAX_RELEASE_PAT }} 
      run: |
        gh release upload ZLEqualizer upload_ready/*.zip --repo "ZL-Audio/ZLAAX" --clobber